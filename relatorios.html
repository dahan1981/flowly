// ─── MINI CHART ─────────────────────────────────────────────────────────────
const Sparkline = ({ data, color, height = 40 }) => {
  const max = Math.max(...data);
  const min = Math.min(...data);
  const range = max - min || 1;
  const w = 120, h = height;
  const pts = data.map((v, i) => `${(i / (data.length - 1)) * w},${h - ((v - min) / range) * h}`).join(" ");
  return (
    <svg width={w} height={h} viewBox={`0 0 ${w} ${h}`} style={{ overflow: "visible" }}>
      <defs>
        <linearGradient id={`g${color}`} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity="0.25" />
          <stop offset="100%" stopColor={color} stopOpacity="0" />
        </linearGradient>
      </defs>
      <polygon points={`0,${h} ${pts} ${w},${h}`} fill={`url(#g${color})`} />
      <polyline points={pts} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
    </svg>
  );
};

// ─── DONUT CHART ─────────────────────────────────────────────────────────────
const Donut = ({ segments, size = 120, thickness = 22 }) => {
  const r = size / 2 - thickness / 2;
  const circ = 2 * Math.PI * r;
  let offset = 0;
  const cx = size / 2, cy = size / 2;
  return (
    <svg width={size} height={size} style={{ transform: "rotate(-90deg)" }}>
      {segments.map((s, i) => {
        const dash = (s.pct / 100) * circ;
        const el = (
          <circle key={i} cx={cx} cy={cy} r={r} fill="none" stroke={s.color}
            strokeWidth={thickness} strokeDasharray={`${dash} ${circ - dash}`}
            strokeDashoffset={-offset * circ / 100} strokeLinecap="round"
            style={{ transition: "stroke-dashoffset 0.8s ease, stroke-dasharray 0.8s ease" }} />
        );
        offset += s.pct;
        return el;
      })}
    </svg>
  );
};

// ─── BAR CHART ───────────────────────────────────────────────────────────────
const BarChart = ({ data }) => {
  const max = Math.max(...data.map(d => d.value));
  return (
    <div style={{ display: "flex", alignItems: "flex-end", gap: 8, height: 80, padding: "0 4px" }}>
      {data.map((d, i) => (
        <div key={i} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 4 }}>
          <div style={{
            width: "100%", borderRadius: 6, background: `linear-gradient(180deg, ${d.color}, ${d.color}88)`,
            height: `${(d.value / max) * 70}px`,
            transition: `height 0.8s cubic-bezier(.34,1.56,.64,1) ${i * 0.06}s`,
            boxShadow: `0 4px 12px ${d.color}44`
          }} />
          <span style={{ fontSize: 10, color: "#64748b", fontWeight: 500 }}>{d.label}</span>
        </div>
      ))}
    </div>
  );
};

// ─── STATUS BADGE ────────────────────────────────────────────────────────────
const Badge = ({ label, color }) => {
  const colors = {
    green: { bg: "#dcfce7", text: "#16a34a" },
    yellow: { bg: "#fef9c3", text: "#ca8a04" },
    blue: { bg: "#dbeafe", text: "#2563eb" },
    purple: { bg: "#f3e8ff", text: "#9333ea" },
    red: { bg: "#fee2e2", text: "#dc2626" },
    gray: { bg: "#f1f5f9", text: "#64748b" },
  };
  const c = colors[color] || colors.gray;
  return (
    <span style={{
      padding: "3px 10px", borderRadius: 20, fontSize: 11, fontWeight: 700,
      background: c.bg, color: c.text, letterSpacing: "0.02em", textTransform: "uppercase"
    }}>{label}</span>
  );
};

// ─── AVATAR ──────────────────────────────────────────────────────────────────
const Avatar = ({ name, size = 36 }) => {
  const colors = ["#7c3aed", "#db2777", "#2563eb", "#059669", "#d97706"];
  const bg = colors[name.charCodeAt(0) % colors.length];
  return (
    <div style={{
      width: size, height: size, borderRadius: "50%", background: bg,
      display: "flex", alignItems: "center", justifyContent: "center",
      color: "#fff", fontWeight: 700, fontSize: size * 0.38, flexShrink: 0,
      fontFamily: "'Outfit', sans-serif"
    }}>{name[0]}</div>
  );
};
